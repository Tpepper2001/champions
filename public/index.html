<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A1128" />

    <!-- Primary Meta -->
    <title>Champions' Leadership Global | Raising Transformational Leaders</title>
    <meta name="description" content="Champions' Leadership Global is a purpose and leadership development brand committed to raising transformational leaders. Discover your purpose, develop your potential, and lead with lasting impact." />
    <meta name="keywords" content="leadership development, purpose discovery, personal transformation, Jerry Oyedele, Champions Leadership Global, coaching, Nigeria, OAU" />
    <meta name="author" content="Champions' Leadership Global" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://championsleadershipglobal.com/" />
    <meta property="og:title" content="Champions' Leadership Global | Raising Transformational Leaders" />
    <meta property="og:description" content="Empowering individuals to discover their purpose and lead with lasting, generational impact. Book a session today." />
    <meta property="og:image" content="https://ijsr.org.ng/wp-content/uploads/2026/03/CLG2.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://championsleadershipglobal.com/" />
    <meta property="twitter:title" content="Champions' Leadership Global | Raising Transformational Leaders" />
    <meta property="twitter:description" content="Empowering individuals to discover their purpose and lead with lasting, generational impact." />
    <meta property="twitter:image" content="https://ijsr.org.ng/wp-content/uploads/2026/03/CLG2.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Apple / PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <style>
      /* Prevent flash of unstyled content */
      html { background: #0A1128; }
      body { margin: 0; background: #FFF8F0; }

      /* Page loader */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #0A1128;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .loader-logo {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: white;
        padding: 6px;
        margin-bottom: 1.5rem;
        animation: pulse 1.8s ease-in-out infinite;
      }
      .loader-text {
        font-family: 'Playfair Display', serif;
        color: white;
        font-size: 1.1rem;
        letter-spacing: 2px;
        margin-bottom: 2rem;
        opacity: 0.85;
      }
      .loader-bar-track {
        width: 160px;
        height: 2px;
        background: rgba(255,255,255,0.15);
        border-radius: 2px;
        overflow: hidden;
      }
      .loader-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #F4D03F, #C86B56);
        border-radius: 2px;
        animation: loadBar 1.6s ease-in-out forwards;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,208,63,0.3); }
        50% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(244,208,63,0); }
      }
      @keyframes loadBar {
        from { width: 0; }
        to   { width: 100%; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Champions' Leadership Global.</noscript>

    <!-- Page loader — hidden once React mounts -->
    <div id="initial-loader">
      <img
        class="loader-logo"
        src="https://ijsr.org.ng/wp-content/uploads/2026/03/CLG2.png"
        alt="Champions Leadership Global"
      />
      <div class="loader-text">Champions&rsquo; Leadership Global</div>
      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Hide loader once React has mounted
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function () { loader.remove(); }, 600);
          }
        }, 800);
      });
    </script>
  </body>
</html>

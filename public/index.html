    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />

    <!-- Apple / PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <style>
      html { background: #0A1128; }
      body { margin: 0; background: #FFF8F0; }

      #initial-loader {
        position: fixed;
        inset: 0;
        background: #0A1128;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .loader-logo {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: white;
        padding: 6px;
        margin-bottom: 1.5rem;
        animation: pulse 1.8s ease-in-out infinite;
      }
      .loader-text {
        font-family: 'Playfair Display', serif;
        color: white;
        font-size: 1.1rem;
        letter-spacing: 2px;
        margin-bottom: 2rem;
        opacity: 0.85;
      }
      .loader-bar-track {
        width: 160px;
        height: 2px;
        background: rgba(255,255,255,0.15);
        border-radius: 2px;
        overflow: hidden;
      }
      .loader-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #F4D03F, #C86B56);
        border-radius: 2px;
        animation: loadBar 1.6s ease-in-out forwards;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,208,63,0.3); }
        50% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(244,208,63,0); }
      }
      @keyframes loadBar {
        from { width: 0; }
        to   { width: 100%; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Champions' Leadership Global.</noscript>

    <div id="initial-loader">
      <img
        class="loader-logo"
        src="https://ijsr.org.ng/wp-content/uploads/2026/03/CLG2.png"
        alt="Champions Leadership Global"
      />
      <div class="loader-text">Champions&rsquo; Leadership Global</div>
      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function () { loader.remove(); }, 600);
          }
        }, 800);
      });
    </script>
  </body>
</html>
